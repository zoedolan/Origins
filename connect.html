<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vybn Chat Test</title><style>body{font-family:system-ui;margin:2rem;background:#0d0f14;color:#f5efe4}main{max-width:760px;margin:auto}input,textarea,button{font:inherit;width:100%;box-sizing:border-box;margin:.5rem 0;padding:.8rem}button{background:#8ed0ff;color:#07111b;border:0;border-radius:999px;font-weight:700}pre{white-space:pre-wrap;background:#080a0f;padding:1rem;min-height:12rem}</style></head><body><main><h1>Vybn Chat Test</h1><p>This tests the live Origins chat API directly: <code>https://api.vybn.ai/api/chat</code>.</p><label>Endpoint<input id="endpoint" value="https://api.vybn.ai/api/chat"></label><label>Message<textarea id="msg" rows="5">health check: reply briefly that chat is working</textarea></label><button id="send">Send test chat</button><pre id="out">Ready.</pre></main><script>send.onclick=async()=>{out.textContent='sending…';try{let r=await fetch(endpoint.value.trim(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg.value,history:[],k:4})});let t=await r.text();if(!r.ok)throw Error('HTTP '+r.status+': '+t.slice(0,1000));let ans='';for(let line of t.split('\n')){if(!line.startsWith('data:'))continue;let p=line.slice(5).trim();if(!p||p==='[DONE]')continue;try{let d=JSON.parse(p);ans+=d.content||d.text||d.reply||''}catch{}}out.textContent=ans||t.slice(0,4000)}catch(e){out.textContent='ERROR: '+(e.message||String(e))}}</script></body></html>
