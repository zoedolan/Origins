<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="referrer" content="no-referrer"><title>Chat Test</title><style>body{margin:0;background:#0d0f14;color:#f5efe4;font-family:system-ui,-apple-system,Segoe UI,sans-serif}main{max-width:980px;margin:32px auto;padding:20px}.box{border:1px solid #394150;border-radius:16px;background:#151923;padding:18px;margin:16px 0}input,textarea{width:100%;box-sizing:border-box;margin:6px 0 12px;padding:10px;border-radius:8px;border:1px solid #394150;background:#090b10;color:white}button{padding:10px 16px;border:0;border-radius:999px;background:#8ed0ff;color:#07111b;font-weight:700}pre{white-space:pre-wrap;min-height:140px;overflow:auto;background:#080a0f;border-radius:10px;padding:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}</style></head><body><main><h1>Chat test page</h1><p>This is only a browser test console for Omni and Vintage. Paste a browser-accessible HTTPS chat-completions endpoint. Endpoint/model stay in this browser; auth is session-only.</p><div class="grid"><section class="box"><h2>Omni image chat</h2><label>Endpoint<input id="oe" placeholder="https://.../v1/chat/completions"></label><label>Model<input id="om" value="omni"></label><label>Session auth, optional<input id="oa" type="password" placeholder="Bearer token"></label><label>Image<input id="oi" type="file" accept="image/*"></label><textarea id="op" rows="4" placeholder="Ask Omni what to notice in this image."></textarea><button id="os">Send to Omni</button><pre id="ol"></pre></section><section class="box"><h2>Vintage text chat</h2><label>Endpoint<input id="ve" placeholder="https://.../v1/chat/completions"></label><label>Model<input id="vm" value="vintage"></label><label>Session auth, optional<input id="va" type="password" placeholder="Bearer token"></label><textarea id="vp" rows="6" placeholder="Prompt Vintage."></textarea><button id="vs">Send to Vintage</button><pre id="vl"></pre></section></div></main><script>(()=>{let g=i=>document.getElementById(i),S=sessionStorage,L=localStorage;['oe','om','ve','vm'].forEach(i=>{g(i).value=L['ct:'+i]||g(i).value;g(i).oninput=()=>L['ct:'+i]=g(i).value});['oa','va'].forEach(i=>{g(i).value=S['ct:'+i]||'';g(i).oninput=()=>S['ct:'+i]=g(i).value});let H=a=>{let h={'Content-Type':'application/json'};if(a&&a.trim()){a=a.trim();h.Authorization=a.toLowerCase().startsWith('bearer ')?a:'Bearer '+a}return h},R=f=>new Promise((y,n)=>{let r=new FileReader;r.onload=()=>y(r.result);r.onerror=n;r.readAsDataURL(f)}),T=d=>{let c=d?.choices?.[0]?.message?.content;return Array.isArray(c)?c.map(p=>p.text||JSON.stringify(p)).join('\n'):(c||d.output_text||JSON.stringify(d,null,2))},P=async(e,m,a,ms)=>{if(!e.trim())throw Error('Set an endpoint first.');let r=await fetch(e.trim(),{method:'POST',headers:H(a),body:JSON.stringify({model:m.trim()||'model',messages:ms,temperature:.7})}),t=await r.text(),d;try{d=JSON.parse(t)}catch{d={raw:t}}if(!r.ok)throw Error('HTTP '+r.status+': '+t.slice(0,1000));return T(d)};g('os').onclick=async()=>{ol.textContent+='USER:\\n'+(op.value||'[image]')+'\\n\\n';try{let c=[];if(op.value)c.push({type:'text',text:op.value});if(oi.files[0])c.push({type:'image_url',image_url:{url:await R(oi.files[0])}});ol.textContent+='OMNI:\\n'+await P(oe.value,om.value,oa.value,[{role:'user',content:c}])+'\\n\\n'}catch(e){ol.textContent+='ERROR:\\n'+e.message+'\\n\\n'}};g('vs').onclick=async()=>{vl.textContent+='USER:\\n'+vp.value+'\\n\\n';try{vl.textContent+='VINTAGE:\\n'+await P(ve.value,vm.value,va.value,[{role:'user',content:vp.value}])+'\\n\\n'}catch(e){vl.textContent+='ERROR:\\n'+e.message+'\\n\\n'}}})();</script></body></html>
